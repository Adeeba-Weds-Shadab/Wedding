<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Wedding Invitation</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Elegant Font -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- COVER CARD -->
<div class="cover">
    <div class="card">
        <h1>Bismillah</h1>
        <p>You are invited to the wedding</p>
        <button onclick="openCard()">Tap to Open</button>
    </div>
</div>

<!-- MAIN INVITATION CARD -->
<div class="content">
    <div class="section">
        <h2>Welcome</h2>
        <p>With the blessings of Allah, we invite you to celebrate this joyous occasion.</p>
    </div>

    <div class="section">
        <h2>Wedding Details</h2>
        <p><strong>Date:</strong> 20th April 2026</p>
        <p><strong>Venue:</strong> Royal Banquet Hall</p>
    </div>

    <div class="section">
        <h2>Dua Request</h2>
        <p>Your presence and prayers mean everything to us.</p>
    </div>
</div>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
