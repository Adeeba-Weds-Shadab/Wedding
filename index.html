<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Palace Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Cinzel:wght@400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* ================= RESET ================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Montserrat',sans-serif;
  background:#000;
  color:white;
  overflow-x:hidden;
}

/* ================= BACKGROUND LAYERS ================= */

.bg-base{
  position:fixed;
  inset:0;
  background:radial-gradient(circle at 30% 20%, #1a1a1a, #000 70%);
  z-index:-5;
}

.bg-pattern{
  position:fixed;
  inset:0;
  background-image:url("https://www.transparenttextures.com/patterns/arabesque.png");
  opacity:0.05;
  z-index:-4;
}

.bg-shimmer{
  position:fixed;
  inset:-50%;
  background:linear-gradient(120deg,transparent,rgba(212,175,55,0.05),transparent);
  animation:shimmer 18s linear infinite;
  z-index:-3;
}

@keyframes shimmer{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

/* FLOATING ORBS */

.bg-orbs{
  position:fixed;
  inset:0;
  z-index:-2;
  overflow:hidden;
}

.orb{
  position:absolute;
  width:350px;
  height:350px;
  border-radius:50%;
  filter:blur(120px);
  opacity:0.25;
  animation:float 20s infinite alternate ease-in-out;
}

.orb1{background:#d4af37; top:-100px; left:-100px;}
.orb2{background:#7b5cff; bottom:-120px; right:-100px; animation-delay:6s;}

@keyframes float{
  from{transform:translate(0,0);}
  to{transform:translate(70px,50px);}
}

/* ================= OPENING SCREEN ================= */

.opening-screen{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:40px 20px;
  transition:opacity 1s ease, transform 1s ease;
}

.opening-screen.fade-out{
  opacity:0;
  transform:scale(1.1);
  pointer-events:none;
}

/* ================= CARD ================= */

.opening-card{
  position:relative;
  width:100%;
  max-width:520px;
  padding:60px 40px;
  border-radius:30px;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(20px);
  text-align:center;
  box-shadow:0 0 60px rgba(212,175,55,0.15);
  transition:transform 0.2s ease;
}

/* GOLD ANIMATED BORDER */

.opening-card::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:30px;
  padding:2px;
  background:linear-gradient(45deg,#d4af37,#f9e27d,#d4af37);
  background-size:300% 300%;
  animation:borderMove 4s linear infinite;
  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;
          mask-composite:exclude;
}

@keyframes borderMove{
  0%{background-position:0% 50%;}
  100%{background-position:100% 50%;}
}

/* ================= TEXT ================= */

.opening-card h3{
  font-family:'Cinzel',serif;
  letter-spacing:3px;
  font-size:14px;
  margin-bottom:20px;
  opacity:0.85;
}

.opening-card h1{
  font-family:'Playfair Display',serif;
  font-size:38px;
  margin-bottom:35px;
}

/* ================= BUTTON ================= */

.enter-btn{
  padding:16px 45px;
  font-size:15px;
  letter-spacing:2px;
  border:none;
  border-radius:50px;
  background:linear-gradient(135deg,#d4af37,#f9e27d);
  color:black;
  font-weight:600;
  cursor:pointer;
  transition:0.3s ease;
  box-shadow:0 0 20px rgba(212,175,55,0.4);
}

.enter-btn:hover{
  transform:scale(1.08);
  box-shadow:0 0 40px rgba(212,175,55,0.8);
}

.enter-btn:active{
  transform:scale(0.95);
}

/* ================= MAIN CONTENT ================= */

.main-content{
  opacity:0;
  transform:translateY(40px);
  transition:opacity 1.2s ease, transform 1.2s ease;
  padding:100px 20px;
}

.main-content.show{
  opacity:1;
  transform:translateY(0);
}

section{
  max-width:900px;
  margin:140px auto;
  text-align:center;
}

h2{
  font-family:'Cinzel',serif;
  font-size:32px;
  margin-bottom:20px;
}

.big-names{
  font-family:'Playfair Display',serif;
  font-size:60px;
  margin-bottom:20px;
}

p{opacity:0.8;}

/* ================= MOBILE ================= */

@media(max-width:768px){

  .opening-card{
    padding:45px 25px;
  }

  .opening-card h1{
    font-size:28px;
  }

  .big-names{
    font-size:38px;
  }

}

</style>
</head>
<body>

<div class="bg-base"></div>
<div class="bg-pattern"></div>
<div class="bg-shimmer"></div>

<div class="bg-orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
</div>

<!-- OPENING -->
<div class="opening-screen" id="opening">
  <div class="opening-card" id="tiltCard">
    <h3>Bismillah-ir-Rahman-ir-Raheem</h3>
    <h1>You Are Invited</h1>
    <button class="enter-btn" id="enterBtn">Enter Invitation</button>
  </div>
</div>

<!-- MAIN -->
<div class="main-content" id="mainContent">
  <section>
    <h2>The Wedding Of</h2>
    <h1 class="big-names">Ahmed & Fatima</h1>
    <p>With the blessings of Allah and our beloved parents</p>
  </section>
</div>

<script>

/* ================= BUTTON FIX (GUARANTEED WORKING) ================= */

const enterBtn = document.getElementById("enterBtn");
const opening = document.getElementById("opening");
const mainContent = document.getElementById("mainContent");

enterBtn.addEventListener("click", function(){

  opening.classList.add("fade-out");

  setTimeout(()=>{
    opening.style.display="none";
    mainContent.classList.add("show");
    window.scrollTo(0,0);
  },1000);

});

/* ================= 3D TILT DESKTOP ================= */

if(window.innerWidth > 768){

  const card = document.getElementById("tiltCard");

  card.addEventListener("mousemove",(e)=>{
    const rect = card.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    const rotateX = -(y - rect.height/2) / 20;
    const rotateY = (x - rect.width/2) / 20;

    card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
  });

  card.addEventListener("mouseleave",()=>{
    card.style.transform="rotateX(0deg) rotateY(0deg)";
  });

}

</script>

</body>
</html>
