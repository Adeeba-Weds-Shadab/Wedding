<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}

html,body{
  height:100%;
  background:#0c0c0c;
  font-family:'Cinzel', serif;
  color:white;
  overflow:hidden;
}

/* LOADER (UNCHANGED) */
.loader{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
  transition:opacity 1s ease;
}
.loader-text{
  font-family:'Playfair Display', serif;
  font-size:22px;
  letter-spacing:3px;
  color:#d4af37;
  margin-bottom:30px;
}
.loader-bar{
  width:200px;
  height:2px;
  background:rgba(255,215,0,0.2);
  overflow:hidden;
  position:relative;
}
.loader-bar::after{
  content:"";
  position:absolute;
  left:-100%;
  width:100%;
  height:100%;
  background:linear-gradient(90deg, transparent, gold, transparent);
  animation:loading 2s infinite;
}
@keyframes loading{
  0%{left:-100%;}
  100%{left:100%;}
}

/* PAGE */
.page{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
  perspective:2000px;
  background:
    radial-gradient(circle at 30% 20%, rgba(255,215,0,0.05), transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(255,215,0,0.05), transparent 40%),
    #0c0c0c;
}

/* CARD */
.invite-box{
  width:100%;
  max-width:650px;
  position:relative;
  background:rgba(20,20,20,0.97);
  padding:70px 50px;
  border-radius:24px;
  text-align:center;
  transform-style:preserve-3d;
  transition:transform .08s ease, box-shadow .08s ease;
  will-change:transform;

  box-shadow:
    0 60px 120px rgba(0,0,0,0.75),
    0 0 80px rgba(212,175,55,0.08),
    inset 0 0 40px rgba(255,215,0,0.03);
}

/* GOLD BORDER */
.invite-box::before{
  content:"";
  position:absolute;
  inset:0;
  padding:2px;
  border-radius:24px;

  background:linear-gradient(
    120deg,
    #5c4500,
    #d4af37,
    #fff2b0,
    #d4af37,
    #7a5a00
  );
  background-size:300% 300%;
  animation:goldFlow 6s ease infinite;

  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;
          mask-composite:exclude;
}
@keyframes goldFlow{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* TEXT */
.invite-title{
  font-size:2.6rem;
  letter-spacing:4px;
  color:#f5e6b3;
  margin-bottom:30px;
}
.invite-subtitle{
  font-family:'Playfair Display', serif;
  font-size:18px;
  line-height:1.8;
  color:#d6d6d6;
  margin-bottom:50px;
}

/* BUTTON */
.enter-btn{
  padding:14px 45px;
  font-size:15px;
  letter-spacing:2px;
  background:linear-gradient(45deg,#d4af37,#f1c94a);
  border:none;
  border-radius:40px;
  cursor:pointer;
  transition:.3s;
}
.enter-btn:hover{
  transform:translateY(-5px);
  box-shadow:
    0 25px 50px rgba(212,175,55,0.5),
    0 0 25px rgba(255,215,0,0.7);
}

/* FADE */
.fade-in{
  opacity:0;
  transform:translateY(30px);
  animation:fadeUp 1.8s ease forwards;
  animation-delay:2s;
}
@keyframes fadeUp{
  to{opacity:1;transform:translateY(0);}
}

/* MOBILE */
@media(max-width:768px){
  html,body{overflow:auto;}
  .invite-box{padding:60px 28px;}
  .invite-title{font-size:1.9rem;}
  .invite-subtitle{font-size:16px;}
  .enter-btn{width:100%;padding:16px;}
}

</style>
</head>
<body>

<div class="loader" id="loader">
  <div class="loader-text">Preparing Invitation</div>
  <div class="loader-bar"></div>
</div>

<div class="page">
  <div class="invite-box fade-in" id="card">
    <div class="invite-title">YOU ARE INVITED</div>
    <div class="invite-subtitle">
      With gratitude and joy, we request the honour of your presence
      at a sacred celebration of love and unity.
    </div>
    <button class="enter-btn">Enter</button>
  </div>
</div>

<script>

/* Loader */
window.addEventListener("load",()=>{
  setTimeout(()=>{
    document.getElementById("loader").style.opacity="0";
    setTimeout(()=>{
      document.getElementById("loader").style.display="none";
    },1000);
  },2000);
});

/* REAL WORKING 3D TILT */
const card = document.getElementById("card");

function tilt(e, isTouch=false){
  const rect = card.getBoundingClientRect();
  const x = isTouch ? e.touches[0].clientX : e.clientX;
  const y = isTouch ? e.touches[0].clientY : e.clientY;

  const centerX = rect.left + rect.width/2;
  const centerY = rect.top + rect.height/2;

  const percentX = (x - centerX) / (rect.width/2);
  const percentY = (y - centerY) / (rect.height/2);

  const rotateY = percentX * 25; 
  const rotateX = -percentY * 25;

  card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.03)`;

  card.style.boxShadow = `
    ${-rotateY*2}px ${rotateX*2}px 120px rgba(0,0,0,0.8),
    0 0 90px rgba(212,175,55,0.12),
    inset 0 0 40px rgba(255,215,0,0.03)
  `;
}

function resetTilt(){
  card.style.transform = "rotateX(0deg) rotateY(0deg) scale(1)";
  card.style.boxShadow = `
    0 60px 120px rgba(0,0,0,0.75),
    0 0 80px rgba(212,175,55,0.08),
    inset 0 0 40px rgba(255,215,0,0.03)
  `;
}

card.addEventListener("mousemove", tilt);
card.addEventListener("mouseleave", resetTilt);

card.addEventListener("touchmove", function(e){
  tilt(e, true);
},{passive:true});

card.addEventListener("touchend", resetTilt);

</script>

</body>
</html>
