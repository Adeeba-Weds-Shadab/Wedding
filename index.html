<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  height:100%;
  background:#050505;
  font-family:'Cinzel',serif;
  overflow-x:hidden;
}

/* ---------- PAGE SYSTEM ---------- */
.page{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:30px 20px;
  transition:opacity 0.8s ease, transform 0.8s ease;
}

.hidden{
  opacity:0;
  pointer-events:none;
  transform:scale(1.05);
}

/* ---------- BACKGROUND SHIMMER ---------- */
.bg-shimmer{
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 30% 30%, rgba(255,215,0,0.12), transparent 40%),
    radial-gradient(circle at 70% 70%, rgba(255,215,0,0.12), transparent 40%);
  animation: shimmerMove 10s linear infinite;
  z-index:-2;
}

@keyframes shimmerMove{
  0%{transform:translateX(-5%);}
  50%{transform:translateX(5%);}
  100%{transform:translateX(-5%);}
}

/* ---------- GEOMETRIC OVERLAY ---------- */
.pattern{
  position:absolute;
  inset:0;
  background-image:url("https://www.transparenttextures.com/patterns/arabesque.png");
  opacity:0.05;
  z-index:-1;
}

/* ---------- 3D CONTAINER ---------- */
.perspective-wrapper{
  perspective:1200px;
  width:100%;
  max-width:650px;
}

/* ---------- INVITE BOX ---------- */
.invite-box{
  position:relative;
  width:100%;
  padding:60px 40px;
  background:rgba(10,10,10,0.96);
  border-radius:20px;
  transform-style:preserve-3d;
  transition:transform 0.2s ease;
  box-shadow:0 0 40px rgba(255,215,0,0.08);
}

/* ---------- TRUE EDGE ANIMATED BORDER ---------- */
.invite-box::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:20px;
  padding:2px;
  background:linear-gradient(90deg,#ff00cc,#ff8800,#ffd700,#00ffff,#ff00cc);
  background-size:300% 300%;
  animation:borderFlow 6s linear infinite;
  z-index:-1;
}

@keyframes borderFlow{
  0%{background-position:0% 50%;}
  100%{background-position:300% 50%;}
}

/* Real inner background to keep border-only look */
.invite-box::after{
  content:"";
  position:absolute;
  inset:2px;
  border-radius:18px;
  background:rgba(10,10,10,0.96);
  z-index:-1;
}

/* ---------- TEXT ---------- */
.invite-box h1{
  font-size:2.4rem;
  color:#ffd700;
  margin-bottom:20px;
}

.invite-box p{
  color:#ccc;
  margin-bottom:30px;
}

/* ---------- BUTTON ---------- */
.enter-btn{
  padding:14px 40px;
  background:linear-gradient(45deg,#d4af37,#ffd700);
  border:none;
  border-radius:30px;
  cursor:pointer;
  font-size:1rem;
  transition:all 0.3s ease;
}

.enter-btn:hover{
  transform:scale(1.1);
  box-shadow:0 0 20px gold;
}

/* ---------- NEXT PAGE ---------- */
.next-content{
  max-width:650px;
  text-align:center;
}

.next-content h2{
  color:#ffd700;
  margin-bottom:20px;
}

/* ---------- MOBILE FIX ---------- */
@media(max-width:768px){
  .invite-box{
    padding:40px 25px;
  }
}

</style>
</head>
<body>

<!-- PAGE 1 -->
<div class="page" id="page1">
  <div class="bg-shimmer"></div>
  <div class="pattern"></div>

  <div class="perspective-wrapper">
    <div class="invite-box" id="card">
      <h1>You Are Invited</h1>
      <p>To witness a moment of elegance and grace.</p>
      <button class="enter-btn" onclick="enterInvitation()">Enter Invitation</button>
    </div>
  </div>
</div>

<!-- PAGE 2 -->
<div class="page hidden" id="page2">
  <div class="bg-shimmer"></div>
  <div class="pattern"></div>

  <div class="next-content">
    <h2>The Celebration Awaits</h2>
    <p>This page now keeps full animated background and environment.</p>
  </div>
</div>

<script>

/* ---------- PAGE TRANSITION ---------- */
function enterInvitation(){
  document.getElementById("page1").classList.add("hidden");
  document.getElementById("page2").classList.remove("hidden");
}

/* ---------- TRUE 3D TILT ---------- */
const card = document.getElementById("card");
const wrapper = document.querySelector(".perspective-wrapper");

wrapper.addEventListener("mousemove",(e)=>{
  const rect = wrapper.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const centerX = rect.width/2;
  const centerY = rect.height/2;
  const rotateX = -(y - centerY)/20;
  const rotateY = (x - centerX)/20;
  card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
});

wrapper.addEventListener("mouseleave",()=>{
  card.style.transform = "rotateX(0) rotateY(0)";
});

/* TOUCH SUPPORT */
wrapper.addEventListener("touchmove",(e)=>{
  const touch = e.touches[0];
  const rect = wrapper.getBoundingClientRect();
  const x = touch.clientX - rect.left;
  const y = touch.clientY - rect.top;
  const centerX = rect.width/2;
  const centerY = rect.height/2;
  const rotateX = -(y - centerY)/25;
  const rotateY = (x - centerX)/25;
  card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
});

wrapper.addEventListener("touchend",()=>{
  card.style.transform = "rotateX(0) rotateY(0)";
});

</script>

</body>
</html>
