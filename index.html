<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Adeeba & Shadab</title>

<style>

body{
margin:0;
background:#000;
font-family:Georgia, serif;
color:white;
overflow-x:hidden;
}

/* ---------------- PAGE SYSTEM ---------------- */

.page{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
transition:opacity .8s ease;
}

.hidden{
opacity:0;
pointer-events:none;
position:absolute;
top:0;
left:0;
width:100%;
}

/* ---------------- DUST ---------------- */

#dust{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:1;
}

.dust{
position:absolute;
width:2px;
height:2px;
background:white;
opacity:0.2;
animation:dustFloat linear infinite;
}

@keyframes dustFloat{
0%{transform:translateY(0)}
100%{transform:translateY(-120vh)}
}

/* ---------------- INVITE BOX ---------------- */

.invite-box{

position:relative;
z-index:5;

padding:50px 30px;
max-width:420px;
width:90%;

border-radius:20px;

border:2px solid transparent;

background:
linear-gradient(#000,#000) padding-box,
linear-gradient(120deg,#8d742f,#e6d08f,#c6a85a,#8d742f) border-box;

transition:transform .25s ease;

}

/* tilt */

.invite-box:hover{
transform:rotateX(3deg) rotateY(-3deg);
}

/* ---------------- TEXT ---------------- */

.invited{

font-size:22px;
letter-spacing:4px;
color:#e6d08f;
margin-bottom:25px;

}

.quran{

font-size:14px;
opacity:.85;
line-height:1.6;
margin-bottom:25px;

}

/* ---------------- ENTER BUTTON ---------------- */

.enter-btn{

padding:12px 34px;

border-radius:30px;

border:1px solid #c6a85a;

background:transparent;

color:#e6d08f;

font-size:15px;
letter-spacing:2px;

cursor:pointer;

transition:.3s;

}

/* GOLD GLOW */

.enter-btn:hover{

box-shadow:
0 0 8px rgba(198,168,90,.5),
0 0 18px rgba(198,168,90,.35);

transform:translateY(-2px);

}

/* ---------------- PAGE 2 ---------------- */

.page2-content{

text-align:center;
max-width:600px;
padding:30px;

}

.names{

font-size:46px;
letter-spacing:3px;
margin-bottom:15px;

background:linear-gradient(#e6d08f,#c6a85a);
-webkit-background-clip:text;
color:transparent;

opacity:0;
transform:translateY(30px);

animation:fadeUp 1.2s forwards;

}

@keyframes fadeUp{

to{
opacity:1;
transform:translateY(0);
}

}

.details{

font-size:17px;
line-height:1.8;

opacity:0;
animation:fadeUp 1.4s forwards;
animation-delay:.4s;

}

.date{

margin-top:18px;
font-size:18px;
color:#e6d08f;

}

/* ---------------- MOBILE ---------------- */

@media(max-width:600px){

.invite-box{
padding:40px 20px;
}

.names{
font-size:34px;
}

}

</style>
</head>

<body>

<!-- DUST -->
<div id="dust"></div>

<!-- PAGE 1 -->

<section id="page1" class="page">

<div class="invite-box">

<div class="invited">YOU ARE INVITED</div>

<div class="quran">
“And We created you in pairs.”  
<br>
(Qur’an 78:8)
</div>

<button class="enter-btn" onclick="openInvite()">
ENTER
</button>

</div>

</section>


<!-- PAGE 2 -->

<section id="page2" class="page hidden">

<div class="page2-content">

<div class="names">
Adeeba & Shadab
</div>

<div class="details">

request the honour of your presence  
at the sacred celebration of their Nikah

<div class="date">
1st April 2026 • Day Event
</div>

<br>

Venue  
<b>M.A. Palace</b>

<br><br>

From  
Mohammad Arshad  
Meerut, U.P. 250002

</div>

</div>

</section>

<script>

/* ---------- PAGE TRANSITION ---------- */

function openInvite(){

const p1=document.getElementById("page1")
const p2=document.getElementById("page2")

p1.style.opacity="0"

setTimeout(function(){

p1.style.display="none"

p2.classList.remove("hidden")
p2.style.opacity="1"

},700)

}

/* ---------- DUST ---------- */

const dust=document.getElementById("dust")

for(let i=0;i<40;i++){

const d=document.createElement("div")

d.className="dust"

d.style.left=Math.random()*100+"%"
d.style.bottom=Math.random()*100+"%"
d.style.animationDuration=8+Math.random()*6+"s"

dust.appendChild(d)

}

</script>

</body>
</html>
