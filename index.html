<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adeeba & Shadab</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0c0c0c;
color:white;
font-family:Poppins, sans-serif;
overflow-x:hidden;
}

/* ---------------- Dust Background ---------------- */

#dust{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:0;
}

/* ---------------- PAGE 1 ---------------- */

#page1{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
position:relative;
z-index:1;
padding:20px;
}

.invite-box{
width:100%;
max-width:420px;
border:1.5px solid rgba(212,175,55,0.8);
border-radius:16px;
padding:40px 30px;
text-align:center;
background:rgba(255,255,255,0.02);
backdrop-filter:blur(6px);
transition:transform .25s ease;
}

.invite-box:hover{
transform:rotateX(5deg) rotateY(-5deg);
}

/* luxury border hue */

.invite-box::before{
content:"";
position:absolute;
inset:-1px;
border-radius:16px;
padding:1px;
background:linear-gradient(120deg,#d4af37,#f6e27a,#d4af37);
-webkit-mask:
linear-gradient(#000 0 0) content-box,
linear-gradient(#000 0 0);
-webkit-mask-composite:xor;
mask-composite:exclude;
animation:borderHue 6s linear infinite;
}

@keyframes borderHue{
0%{filter:hue-rotate(0deg)}
100%{filter:hue-rotate(360deg)}
}

/* title */

.title{
font-family:Cinzel;
font-size:28px;
letter-spacing:3px;
margin-bottom:18px;
}

/* quran quote */

.quote{
font-size:13px;
opacity:.75;
line-height:1.6;
margin-bottom:30px;
}

/* enter button */

.enter-btn{
padding:12px 32px;
border:1px solid #d4af37;
background:transparent;
color:#d4af37;
font-family:Cinzel;
letter-spacing:2px;
cursor:pointer;
border-radius:6px;
transition:all .3s ease;
}

.enter-btn:hover{
box-shadow:0 0 12px rgba(212,175,55,0.45);
}

/* ---------------- PAGE 2 ---------------- */

#page2{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
background:#0c0c0c;
opacity:0;
pointer-events:none;
transition:opacity .9s ease;
padding:25px;
}

#page2.show{
opacity:1;
pointer-events:auto;
}

.page2-content{
max-width:550px;
text-align:center;
}

.invite-text{
font-size:15px;
opacity:.85;
margin-bottom:22px;
line-height:1.7;
}

.names{
font-family:Cinzel;
font-size:42px;
letter-spacing:4px;
margin:18px 0;
}

.names span{
display:inline-block;
opacity:0;
transform:translateY(30px);
animation:fadeUp 1.3s ease forwards;
}

.names span:nth-child(2){
animation-delay:.5s;
}

@keyframes fadeUp{
to{
opacity:1;
transform:translateY(0);
}
}

.details{
font-size:15px;
opacity:.85;
line-height:1.8;
margin-top:16px;
}

.host{
margin-top:28px;
font-size:14px;
opacity:.7;
}

/* ---------------- MOBILE ---------------- */

@media(max-width:480px){

.title{
font-size:24px;
}

.names{
font-size:32px;
letter-spacing:3px;
}

.invite-box{
padding:34px 24px;
}

}

</style>
</head>

<body>

<canvas id="dust"></canvas>

<!-- PAGE 1 -->

<section id="page1">

<div class="invite-box">

<div class="title">YOU ARE INVITED</div>

<div class="quote">
“And We created you in pairs.”<br>
<span style="font-size:11px;opacity:.6;">— Qur'an 78:8</span>
</div>

<button class="enter-btn" id="enterBtn">ENTER</button>

</div>

</section>


<!-- PAGE 2 -->

<section id="page2">

<div class="page2-content">

<div class="invite-text">
With the blessings of Allah,  
we request the honour of your presence  
at the Nikah ceremony of
</div>

<div class="names">
<span>Adeeba</span>
&nbsp; &nbsp;Weds&nbsp; &nbsp;
<span>Shadab</span>
</div>

<div class="details">
Tuesday, 1st April 2026<br>
Nikah Ceremony<br>
Venue: M.A. Palace
</div>

<div class="host">
Invitation by<br>
Mohammad Arshad<br>
Meerut, Uttar Pradesh – 250002
</div>

</div>

</section>

<script>

/* ---------------- PAGE SWITCH ---------------- */

document.getElementById("enterBtn").addEventListener("click",function(){

document.getElementById("page1").style.display="none";

document.getElementById("page2").classList.add("show");

});

/* ---------------- DUST PARTICLES ---------------- */

const canvas=document.getElementById("dust");
const ctx=canvas.getContext("2d");

let w=canvas.width=window.innerWidth;
let h=canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<60;i++){
particles.push({
x:Math.random()*w,
y:Math.random()*h,
r:Math.random()*1.5,
d:Math.random()*1
});
}

function draw(){

ctx.clearRect(0,0,w,h);

ctx.fillStyle="rgba(212,175,55,0.15)";

ctx.beginPath();

for(let i=0;i<particles.length;i++){

let p=particles[i];

ctx.moveTo(p.x,p.y);

ctx.arc(p.x,p.y,p.r,0,Math.PI*2,true);

}

ctx.fill();

update();

}

function update(){

for(let i=0;i<particles.length;i++){

let p=particles[i];

p.y+=0.2*p.d;

if(p.y>h){
p.y=0;
p.x=Math.random()*w;
}

}

}

function animate(){
draw();
requestAnimationFrame(animate);
}

animate();

window.addEventListener("resize",function(){

w=canvas.width=window.innerWidth;
h=canvas.height=window.innerHeight;

});

</script>

</body>
</html>
