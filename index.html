<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adeeba & Shadab Wedding</title>

<style>

body{
margin:0;
font-family: 'Georgia', serif;
background:black;
color:white;
overflow-x:hidden;
}

/* -------- GOLD VARIABLES -------- */

:root{
--gold1:#c6a85a;
--gold2:#e6d08f;
--gold3:#8d742f;
}

/* -------- PAGE SYSTEM -------- */

.page{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
padding:20px;
text-align:center;
transition:opacity 0.8s ease;
}

.hidden{
opacity:0;
pointer-events:none;
position:absolute;
top:0;
left:0;
width:100%;
}

/* -------- DUST PARTICLES -------- */

#dust{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:1;
}

.dust{
position:absolute;
width:2px;
height:2px;
background:white;
opacity:0.15;
animation:float 12s linear infinite;
}

@keyframes float{
0%{transform:translateY(0px);}
100%{transform:translateY(-120vh);}
}

/* -------- INVITE BOX -------- */

.invite-box{

position:relative;
z-index:2;

border:2px solid transparent;
border-radius:20px;
padding:50px 30px;

max-width:420px;
width:90%;

background:rgba(0,0,0,0.6);

background-image:
linear-gradient(black,black),
linear-gradient(120deg,var(--gold1),var(--gold2),var(--gold3));

background-origin:border-box;
background-clip:padding-box,border-box;

transition:transform .25s ease;

}

/* tilt */

.invite-box:hover{
transform:rotateX(4deg) rotateY(-4deg);
}

/* -------- TEXT -------- */

.invited{
font-size:22px;
letter-spacing:3px;
margin-bottom:20px;
color:var(--gold2);
}

.quran{
font-size:14px;
opacity:0.8;
margin-bottom:25px;
line-height:1.5;
}

/* -------- ENTER BUTTON -------- */

.enter-btn{

margin-top:10px;
padding:12px 34px;
border-radius:30px;

border:1px solid var(--gold1);
background:transparent;
color:var(--gold2);

font-size:16px;
letter-spacing:2px;

cursor:pointer;

transition:all .3s ease;
}

.enter-btn:hover{

box-shadow:
0 0 12px rgba(198,168,90,0.5),
0 0 25px rgba(198,168,90,0.4);

}

/* -------- PAGE 2 -------- */

.names{

font-size:48px;
letter-spacing:3px;
margin-bottom:20px;

background:linear-gradient(var(--gold2),var(--gold1));
-webkit-background-clip:text;
color:transparent;

opacity:0;
transform:translateY(20px);
animation:fadeUp 1.2s forwards;
}

@keyframes fadeUp{
to{
opacity:1;
transform:translateY(0);
}
}

.details{

font-size:16px;
line-height:1.8;
max-width:500px;
margin-top:10px;
opacity:0;
animation:fadeUp 1.4s forwards;
animation-delay:.3s;
}

.date{
margin-top:20px;
font-size:18px;
color:var(--gold2);
letter-spacing:1px;
}

/* -------- MOBILE -------- */

@media(max-width:600px){

.names{
font-size:36px;
}

.invite-box{
padding:40px 20px;
}

}

</style>
</head>

<body>

<!-- DUST -->
<div id="dust"></div>

<!-- PAGE 1 -->

<section id="page1" class="page">

<div class="invite-box">

<div class="invited">YOU ARE INVITED</div>

<div class="quran">
“And We created you in pairs.”  
<br>
(Qur’an 78:8)
</div>

<button class="enter-btn" onclick="openInvite()">
ENTER
</button>

</div>

</section>

<!-- PAGE 2 -->

<section id="page2" class="page hidden">

<div class="names">
Adeeba & Shadab
</div>

<div class="details">

request the honour of your presence  
at the sacred celebration of their Nikah

<div class="date">
1st April 2026 • Day Event
</div>

<br>

Venue  
<b>M.A. Palace</b>

<br><br>

From  
Mohammad Arshad  
Meerut, U.P. 250002

</div>

</section>

<script>

/* OPEN PAGE 2 */

function openInvite(){

document.getElementById("page1").style.opacity="0";

setTimeout(function(){

document.getElementById("page1").classList.add("hidden");
document.getElementById("page2").classList.remove("hidden");
document.getElementById("page2").style.opacity="1";

},600)

}

/* DUST PARTICLES */

const dustContainer=document.getElementById("dust");

for(let i=0;i<40;i++){

const d=document.createElement("div");

d.classList.add("dust");

d.style.left=Math.random()*100+"%";
d.style.bottom=Math.random()*100+"%";
d.style.animationDuration=8+Math.random()*6+"s";

dustContainer.appendChild(d);

}

</script>

</body>
</html>
