<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at top, #1a1a1a, #000000);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow-x: hidden;
}

/* GOLD ANIMATION OVERLAY */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(212,175,55,0.08) 0%, transparent 60%);
  animation: glow 6s linear infinite;
}

@keyframes glow {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

.card {
  width: 90%;
  max-width: 400px;
  background: #111;
  padding: 40px 30px;
  border-radius: 20px;
  text-align: center;
  box-shadow: 0 30px 80px rgba(0,0,0,0.7);
  border: 1px solid rgba(212,175,55,0.2);
  position: relative;
  z-index: 2;
}

h1 {
  font-family: 'Cinzel', serif;
  color: #d4af37;
  font-size: 28px;
  letter-spacing: 2px;
  margin-bottom: 10px;
}

.subtitle {
  color: #aaa;
  font-size: 13px;
  margin-bottom: 25px;
}

button {
  padding: 12px 28px;
  border-radius: 40px;
  border: 1px solid #d4af37;
  background: transparent;
  color: #d4af37;
  font-size: 13px;
  cursor: pointer;
  transition: 0.4s ease;
}

button:hover {
  background: #d4af37;
  color: black;
  box-shadow: 0 0 20px rgba(212,175,55,0.6);
}

.section {
  max-height: 0;
  overflow: hidden;
  transition: 0.8s ease;
}

.section.show {
  max-height: 500px;
  margin-top: 30px;
}

.section h2 {
  font-family: 'Cinzel', serif;
  color: #d4af37;
  font-size: 20px;
  margin-bottom: 10px;
}

.section p {
  color: #ccc;
  font-size: 14px;
  line-height: 1.7;
}

.divider {
  width: 60px;
  height: 2px;
  background: #d4af37;
  margin: 15px auto;
}

</style>
</head>

<body>

<div class="card">

  <h1>BISMILLAH</h1>
  <p class="subtitle">Together with our families, we invite you</p>

  <button onclick="openInvite()">Open Invitation</button>

  <div id="content" class="section">
    
    <div class="divider"></div>

    <h2>Welcome</h2>
    <p>With the blessings of Allah, we request the honor of your presence at our Nikah ceremony.</p>

    <div class="divider"></div>

    <h2>Wedding Details</h2>
    <p><strong>Date:</strong> 15 May 2026</p>
    <p><strong>Venue:</strong> Royal Banquet Hall</p>

    <div class="divider"></div>

    <h2>Dua Request</h2>
    <p>Your prayers and presence will complete our happiness.</p>

  </div>

</div>

<script>
function openInvite() {
  document.getElementById("content").classList.toggle("show");
}
</script>

</body>
</html>
