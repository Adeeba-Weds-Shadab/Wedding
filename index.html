<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}

html,body{
  height:100%;
  background:#0c0c0c;
  font-family:'Cinzel', serif;
  color:white;
  scroll-behavior:smooth;
}

/* LOADER */
.loader{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
  transition:opacity 1s ease;
}
.loader-text{
  font-family:'Playfair Display', serif;
  font-size:22px;
  letter-spacing:3px;
  color:#d4af37;
  margin-bottom:30px;
}
.loader-bar{
  width:200px;
  height:2px;
  background:rgba(255,215,0,0.2);
  overflow:hidden;
  position:relative;
}
.loader-bar::after{
  content:"";
  position:absolute;
  left:-100%;
  width:100%;
  height:100%;
  background:linear-gradient(90deg, transparent, gold, transparent);
  animation:loading 2s infinite;
}
@keyframes loading{
  0%{left:-100%;}
  100%{left:100%;}
}

/* PAGE BASE */
.section{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:80px 20px;
  position:relative;
  text-align:center;
}

/* GOLD DUST (shared) */
.dust{
  position:absolute;
  width:4px;
  height:4px;
  background:radial-gradient(circle, #fff4c4, #d4af37);
  border-radius:50%;
  opacity:0.5;
  animation:float linear infinite;
}
@keyframes float{
  from{transform:translateY(0);}
  to{transform:translateY(-120vh);}
}

/* =========================
   PAGE 1
========================= */

.section1{
  perspective:2000px;
  overflow:hidden;
}

.invite-box{
  width:100%;
  max-width:650px;
  position:relative;
  background:rgba(20,20,20,0.97);
  padding:70px 50px;
  border-radius:24px;
  text-align:center;
  transform-style:preserve-3d;
  transition:transform .08s ease;
  will-change:transform;
  z-index:2;
  box-shadow:
    0 60px 120px rgba(0,0,0,0.75),
    0 0 80px rgba(212,175,55,0.08),
    inset 0 0 40px rgba(255,215,0,0.03);
}

.invite-box::before{
  content:"";
  position:absolute;
  inset:0;
  padding:2px;
  border-radius:24px;
  background:linear-gradient(
    120deg,
    #5c4500,
    #d4af37,
    #fff2b0,
    #d4af37,
    #7a5a00
  );
  background-size:300% 300%;
  animation:goldFlow 6s ease infinite;
  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;
          mask-composite:exclude;
}
@keyframes goldFlow{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

.invite-title{
  font-size:2.6rem;
  letter-spacing:4px;
  color:#f5e6b3;
  margin-bottom:30px;
}

.invite-subtitle{
  font-family:'Playfair Display', serif;
  font-size:18px;
  line-height:1.8;
  color:#d6d6d6;
  margin-bottom:50px;
}

.enter-btn{
  padding:14px 45px;
  font-size:15px;
  letter-spacing:2px;
  background:linear-gradient(45deg,#d4af37,#f1c94a);
  border:none;
  border-radius:40px;
  cursor:pointer;
  transition:.3s;
}
.enter-btn:hover{
  transform:translateY(-5px);
  box-shadow:
    0 25px 50px rgba(212,175,55,0.5),
    0 0 25px rgba(255,215,0,0.7);
}

/* =========================
   PAGE 2 (Couple Reveal)
========================= */

.section2{
  background:#0c0c0c;
}

.couple-names{
  font-size:3rem;
  letter-spacing:4px;
  color:#f5e6b3;
  margin-bottom:25px;
}

.amp{
  font-family:'Playfair Display', serif;
  font-size:2rem;
  color:#d4af37;
  margin:10px 0;
}

.gold-divider{
  width:120px;
  height:1px;
  background:linear-gradient(to right, transparent, #d4af37, transparent);
  margin:40px auto;
}

.wedding-date{
  font-family:'Playfair Display', serif;
  font-size:20px;
  letter-spacing:3px;
  color:#d6d6d6;
  margin-bottom:25px;
}

.spiritual-line{
  font-family:'Playfair Display', serif;
  font-size:16px;
  color:rgba(212,175,55,0.7);
  max-width:600px;
  line-height:1.8;
}

/* MOBILE */
@media(max-width:768px){

  .invite-box{padding:60px 28px;}
  .invite-title{font-size:1.9rem;}
  .invite-subtitle{font-size:16px;}
  .enter-btn{width:100%;padding:16px;}

  .couple-names{font-size:2rem;}
  .wedding-date{font-size:16px;}
  .spiritual-line{font-size:14px;}
}

</style>
</head>
<body>

<div class="loader" id="loader">
  <div class="loader-text">Preparing Invitation</div>
  <div class="loader-bar"></div>
</div>

<!-- PAGE 1 -->
<section class="section section1" id="page1">

  <!-- Gold Dust -->
  <div class="dust" style="left:10%; animation-duration:16s;"></div>
  <div class="dust" style="left:30%; animation-duration:18s;"></div>
  <div class="dust" style="left:50%; animation-duration:20s;"></div>
  <div class="dust" style="left:70%; animation-duration:22s;"></div>
  <div class="dust" style="left:90%; animation-duration:19s;"></div>

  <div class="invite-box" id="card">
    <div class="invite-title">YOU ARE INVITED</div>
    <div class="invite-subtitle">
      With gratitude and joy, we request the honour of your presence
      at a sacred celebration of love and unity.
    </div>
    <button class="enter-btn" onclick="goToPage2()">Enter</button>
  </div>

</section>

<!-- PAGE 2 -->
<section class="section section2" id="page2">

  <div class="couple-names">Aisha</div>
  <div class="amp">&</div>
  <div class="couple-names">Omar</div>

  <div class="gold-divider"></div>

  <div class="wedding-date">
    15 December 2026
  </div>

  <div class="spiritual-line">
    “And He placed between you affection and mercy.”
  </div>

</section>

<script>

/* Loader */
window.addEventListener("load",()=>{
  setTimeout(()=>{
    document.getElementById("loader").style.opacity="0";
    setTimeout(()=>{
      document.getElementById("loader").style.display="none";
    },1000);
  },2000);
});

/* Scroll to Page 2 */
function goToPage2(){
  document.getElementById("page2").scrollIntoView({behavior:"smooth"});
}

/* Tilt */
const card = document.getElementById("card");

function tilt(e, isTouch=false){
  const rect = card.getBoundingClientRect();
  const x = isTouch ? e.touches[0].clientX : e.clientX;
  const y = isTouch ? e.touches[0].clientY : e.clientY;

  const centerX = rect.left + rect.width/2;
  const centerY = rect.top + rect.height/2;

  const percentX = (x - centerX) / (rect.width/2);
  const percentY = (y - centerY) / (rect.height/2);

  const rotateY = percentX * 18;
  const rotateX = -percentY * 18;

  card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.03)`;
}

function resetTilt(){
  card.style.transform = "rotateX(0deg) rotateY(0deg) scale(1)";
}

card.addEventListener("mousemove", tilt);
card.addEventListener("mouseleave", resetTilt);
card.addEventListener("touchmove", function(e){ tilt(e,true); }, {passive:true});
card.addEventListener("touchend", resetTilt);

</script>

</body>
</html>
