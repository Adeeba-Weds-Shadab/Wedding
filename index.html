<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adeeba & Shadab - Royal Barat Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  height:100%;
  background:linear-gradient(to bottom,#050505,#111);
  font-family:'Cinzel',serif;
  overflow-x:hidden;
  color:white;
}

/* ================= LOADER ================= */
.loader{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  transition:opacity 1.5s ease;
}
.loader h1{
  font-family:'Playfair Display',serif;
  font-size:40px;
  letter-spacing:4px;
  color:#d4af37;
  animation:fadePulse 2s infinite alternate;
}
@keyframes fadePulse{
  from{opacity:0.4;}
  to{opacity:1;}
}

/* ================= PAGE SYSTEM ================= */
.page{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:40px 20px;
  transition:opacity 1s ease, transform 1s ease;
}
.hidden{
  opacity:0;
  pointer-events:none;
  transform:scale(1.1);


/* ===============================
   ROYAL SPIRITUAL INTRO (PAGE 1)
================================= */

.invite-content{
  animation: royalFade 2.5s ease forwards;
  opacity:0;
}

@keyframes royalFade{
  0%{opacity:0; transform:translateY(40px);}
  100%{opacity:1; transform:translateY(0);}
}

/* Quran Quote Styling */

.quran-quote{
  margin-top:60px;
  max-width:700px;
  margin-left:auto;
  margin-right:auto;
  line-height:1.8;
  font-family:'Playfair Display', serif;
  font-size:18px;
  color:#e8d8a8;
  letter-spacing:0.5px;
  opacity:0;
  animation: fadeQuote 3s ease forwards;
  animation-delay:1.2s;
}

.quran-source{
  margin-top:15px;
  font-size:14px;
  color:#d4af37;
  letter-spacing:2px;
}

@keyframes fadeQuote{
  0%{opacity:0; transform:translateY(30px);}
  100%{opacity:1; transform:translateY(0);}
}

/* Decorative Divider */

.gold-divider{
  width:120px;
  height:2px;
  margin:40px auto;
  background:linear-gradient(to right, transparent, #d4af37, transparent);
  opacity:0.6;
}

/* Floating 3D Ornaments */

.floating-ornament{
  position:absolute;
  width:60px;
  height:60px;
  border:1px solid rgba(212,175,55,0.4);
  border-radius:50%;
  animation: floatOrb 8s ease-in-out infinite;
  backdrop-filter:blur(3px);
}

.floating-ornament::before{
  content:"";
  position:absolute;
  inset:10px;
  border-radius:50%;
  border:1px solid rgba(255,215,0,0.5);
}

.orb1{ top:15%; left:10%; animation-delay:0s; }
.orb2{ bottom:20%; right:12%; animation-delay:2s; }
.orb3{ top:35%; right:8%; animation-delay:4s; }

@keyframes floatOrb{
  0%{transform:translateY(0px) rotate(0deg);}
  50%{transform:translateY(-25px) rotate(180deg);}
  100%{transform:translateY(0px) rotate(360deg);}
}

/* Extra Glow */

.invite-box{
  position:relative;
}

.invite-box::after{
  content:"";
  position:absolute;
  top:-40px;
  left:-40px;
  right:-40px;
  bottom:-40px;
  background:radial-gradient(circle, rgba(255,215,0,0.08), transparent 70%);
  z-index:-1;
}

  
  
}
#page2{
  position:absolute;
  overflow-y:auto;
  padding:120px 20px;
}

/* ================= BACKGROUND ================= */
.bg-shimmer{
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 20% 20%, rgba(255,215,0,0.15), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(255,215,0,0.12), transparent 40%);
  animation: shimmerMove 20s linear infinite;
  z-index:-2;
}
@keyframes shimmerMove{
  0%{transform:translateX(-3%);}
  50%{transform:translateX(3%);}
  100%{transform:translateX(-3%);}
}

.light-sweep{
  position:absolute;
  top:-50%;
  left:-50%;
  width:200%;
  height:200%;
  background:radial-gradient(circle, rgba(255,215,0,0.15), transparent 60%);
  animation:rotateLight 30s linear infinite;
  z-index:-3;
}
@keyframes rotateLight{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

/* ================= GOLD PARTICLES ================= */
canvas{
  position:absolute;
  inset:0;
  z-index:-1;
  pointer-events:none;
}

<div class="floating-ornament orb1"></div>
<div class="floating-ornament orb2"></div>
<div class="floating-ornament orb3"></div>

  
/* ================= 3D CARD ================= */
.perspective-wrapper{
  perspective:1200px;
  width:100%;
  max-width:650px;
}
.invite-box{
  padding:60px 40px;
  background:rgba(15,15,15,0.9);
  border-radius:20px;
  text-align:center;
  transition:transform .3s ease;
  box-shadow:
    0 30px 60px rgba(0,0,0,0.6),
    0 0 80px rgba(212,175,55,0.2),
    inset 0 0 40px rgba(255,215,0,0.05);
}
.invite-box h1{font-size:2.5rem;color:#ffd700;margin-bottom:20px;}
.invite-box p{color:#ccc;margin-bottom:30px;}

.enter-btn{
  padding:14px 40px;
  background:linear-gradient(45deg,#d4af37,#ffd700);
  border:none;
  border-radius:30px;
  cursor:pointer;
  transition:.3s;
}
.enter-btn:hover{
  transform:scale(1.1);
  box-shadow:0 0 20px gold;
}

/* ================= COUPLE SECTION ================= */
.couple-section{
  padding:120px 20px;
  text-align:center;
  position:relative;
}
.bride-name,.groom-name{
  font-family:'Playfair Display',serif;
  font-size:64px;
  background:linear-gradient(45deg,#d4af37,#fff8dc,#d4af37);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  margin:10px 0;
}
.and-symbol{
  font-size:48px;
  color:#d4af37;
}
.family-side{
  margin-top:30px;
  color:#ccc;
}

/* ================= TIMELINE ================= */
.timeline{
  margin:100px auto;
  max-width:700px;
}
.timeline-item{
  opacity:0;
  transform:translateY(40px);
  transition:1s;
}
.timeline-item.visible{
  opacity:1;
  transform:translateY(0);
}

/* ================= MUSIC BUTTON ================= */
.music-btn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:gold;
  color:black;
  padding:12px 18px;
  border-radius:50px;
  cursor:pointer;
  font-weight:bold;
  z-index:999;
}

@media(max-width:768px){
.bride-name,.groom-name{font-size:42px;}
}
</style>
</head>
<body>

<!-- LOADER -->
<div class="loader" id="loader">
  <h1>Loading Invitation...</h1>
</div>

<audio id="bgMusic" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_8dff2d4e8f.mp3?filename=wedding-piano-110624.mp3">
</audio>

<div class="music-btn" onclick="toggleMusic()">Music</div>

<!-- PAGE 1 -->
<div class="page" id="page1">
  <div class="bg-shimmer"></div>
  <div class="light-sweep"></div>
  <canvas id="particles1"></canvas>

  <div class="perspective-wrapper">
    <div class="invite-box" id="card">
      <h1>You Are Invited</h1>
      <p>With joy, we invite you to our Barat celebration.</p>
      <button class="enter-btn" onclick="enterInvitation()">Enter Invitation</button>
    </div>
  </div>
</div>

<!-- PAGE 2 -->
<div class="page hidden" id="page2">
  <div class="bg-shimmer"></div>
  <div class="light-sweep"></div>
  <canvas id="particles2"></canvas>

  <div style="max-width:900px;margin:auto;text-align:center;">

    <section class="couple-section">
      <h1 class="bride-name">Adeeba</h1>
      <div class="and-symbol">&</div>
      <h1 class="groom-name">Shadab</h1>
      <p class="family-side">Request the honour of your presence</p>
    </section>

    <div class="timeline">
      <div class="timeline-item">Welcome Reception</div>
      <div class="timeline-item">Barat Arrival</div>
      <div class="timeline-item">Lunch & Celebration</div>
    </div>

  </div>
</div>

<script>

/* LOADER */
window.addEventListener("load",()=>{
  setTimeout(()=>{
    document.getElementById("loader").style.opacity="0";
    setTimeout(()=>{
      document.getElementById("loader").style.display="none";
    },1500);
  },2000);
});

/* PAGE SWITCH */
function enterInvitation(){
  document.getElementById("page1").classList.add("hidden");
  document.getElementById("page2").classList.remove("hidden");
  document.getElementById("bgMusic").volume=0;
  document.getElementById("bgMusic").play();
  fadeInMusic();
}

/* MUSIC */
function toggleMusic(){
  const music=document.getElementById("bgMusic");
  if(music.paused){music.play();fadeInMusic();}
  else{music.pause();}
}
function fadeInMusic(){
  const music=document.getElementById("bgMusic");
  let vol=0;
  const interval=setInterval(()=>{
    if(vol<0.6){
      vol+=0.02;
      music.volume=vol;
    }else clearInterval(interval);
  },200);
}

/* TIMELINE OBSERVER */
const observer=new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add("visible");
    }
  });
},{threshold:0.2});
document.querySelectorAll(".timeline-item").forEach(item=>observer.observe(item));

/* 3D TILT */
const card=document.getElementById("card");
const wrapper=document.querySelector(".perspective-wrapper");
wrapper.addEventListener("mousemove",(e)=>{
  const rect=wrapper.getBoundingClientRect();
  const x=e.clientX-rect.left;
  const y=e.clientY-rect.top;
  const rotateX=((y-rect.height/2)/(rect.height/2))*10;
  const rotateY=((x-rect.width/2)/(rect.width/2))*10;
  card.style.transform=`rotateX(${-rotateX}deg) rotateY(${rotateY}deg)`;
});
wrapper.addEventListener("mouseleave",()=>card.style.transform="rotateX(0) rotateY(0)");

/* GOLD PARTICLES */
function createParticles(canvasId){
  const canvas=document.getElementById(canvasId);
  const ctx=canvas.getContext("2d");
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;

  let particles=[];
  for(let i=0;i<80;i++){
    particles.push({
      x:Math.random()*canvas.width,
      y:Math.random()*canvas.height,
      r:Math.random()*2,
      d:Math.random()*1
    });
  }

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="rgba(255,215,0,0.6)";
    particles.forEach(p=>{
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fill();
    });
    update();
  }

  function update(){
    particles.forEach(p=>{
      p.y+=p.d;
      if(p.y>canvas.height){p.y=0;p.x=Math.random()*canvas.width;}
    });
  }

  setInterval(draw,30);
}

createParticles("particles1");
createParticles("particles2");

</script>
</body>
</html>
