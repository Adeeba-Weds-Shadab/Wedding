<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Cinzel:wght@400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* ================= RESET ================= */

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #000;
  color: white;
  font-family: 'Montserrat', sans-serif;
  overflow-x: hidden;
}

/* ================= BACKGROUND BASE ================= */

body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at 30% 20%, #1a1a1a, #000 70%);
  z-index: -4;
}

/* ================= GOLD SHIMMER ================= */

body::after {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: linear-gradient(120deg,
    transparent,
    rgba(212,175,55,0.06),
    transparent);
  animation: shimmer 15s infinite linear;
  z-index: -3;
}

@keyframes shimmer {
  0% { transform: translateX(-50%) translateY(-50%) rotate(0deg); }
  100% { transform: translateX(0%) translateY(0%) rotate(360deg); }
}

/* ================= ISLAMIC PATTERN OVERLAY ================= */

.pattern-overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background-image: url("https://www.transparenttextures.com/patterns/arabesque.png");
  opacity: 0.05;
  z-index: -2;
}

/* ================= FLOATING ORBS ================= */

.luxury-bg {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: -1;
  overflow: hidden;
}

.light-orb {
  position: absolute;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  filter: blur(150px);
  opacity: 0.25;
  animation: float 20s infinite alternate ease-in-out;
}

.orb1 { background: #d4af37; top: -100px; left: -100px; }
.orb2 { background: #7b5cff; bottom: -150px; right: -100px; animation-delay: 6s; }

@keyframes float {
  0% { transform: translate(0,0); }
  100% { transform: translate(80px,60px); }
}

/* ================= OPENING SCREEN ================= */

.opening-screen {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  transition: opacity 1s ease, transform 1s ease;
}

.opening-screen.fade-out {
  opacity: 0;
  transform: scale(1.1);
  pointer-events: none;
}

/* ================= GOLD FRAME ================= */

.opening-card {
  position: relative;
  padding: 70px 50px;
  border-radius: 30px;
  text-align: center;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(20px);
}

.opening-card::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 30px;
  padding: 2px;
  background: linear-gradient(45deg, #d4af37, #f9e27d, #d4af37);
  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
          mask-composite: exclude;
  animation: borderGlow 4s linear infinite;
}

@keyframes borderGlow {
  0% { filter: hue-rotate(0deg); }
  100% { filter: hue-rotate(360deg); }
}

.opening-card h3 {
  font-family: 'Cinzel', serif;
  letter-spacing: 4px;
  margin-bottom: 20px;
  opacity: 0.8;
}

.opening-card h1 {
  font-family: 'Playfair Display', serif;
  font-size: 44px;
  margin-bottom: 40px;
}

/* ================= BUTTON ================= */

.enter-btn {
  padding: 18px 60px;
  font-size: 16px;
  letter-spacing: 2px;
  background: linear-gradient(135deg, #d4af37, #f9e27d);
  border: none;
  border-radius: 50px;
  cursor: pointer;
  color: black;
  font-weight: 600;
  transition: 0.4s ease;
}

.enter-btn:hover {
  transform: scale(1.07);
  box-shadow: 0 0 40px rgba(212,175,55,0.7);
}

/* ================= MAIN CONTENT ================= */

.main-content {
  opacity: 0;
  transform: translateY(50px);
  transition: opacity 1.2s ease, transform 1.2s ease;
  padding: 100px 20px;
}

.main-content.show {
  opacity: 1;
  transform: translateY(0);
}

section {
  max-width: 900px;
  margin: 140px auto;
  text-align: center;
}

h2 {
  font-family: 'Cinzel', serif;
  font-size: 36px;
  margin-bottom: 20px;
}

.big-names {
  font-family: 'Playfair Display', serif;
  font-size: 60px;
  margin-bottom: 20px;
}

/* ================= 3D TILT ================= */

.tilt {
  transition: transform 0.1s ease;
  transform-style: preserve-3d;
}

/* ================= COUNTDOWN ================= */

#countdown {
  font-size: 28px;
  letter-spacing: 3px;
  margin-top: 20px;
}

/* ================= MOBILE FIX ================= */

@media (max-width: 768px) {

  .opening-card {
    padding: 40px 20px;
  }

  .opening-card h1 {
    font-size: 30px;
  }

  .big-names {
    font-size: 38px;
  }

}

</style>
</head>
<body>

<div class="pattern-overlay"></div>

<div class="luxury-bg">
  <div class="light-orb orb1"></div>
  <div class="light-orb orb2"></div>
</div>

<!-- OPENING SCREEN -->
<div class="opening-screen" id="opening">
  <div class="opening-card tilt">
    <h3>Bismillah-ir-Rahman-ir-Raheem</h3>
    <h1>You Are Invited</h1>
    <button class="enter-btn" onclick="enterInvitation()">Enter Invitation</button>
  </div>
</div>

<!-- MAIN CONTENT -->
<div class="main-content" id="mainContent">

  <section>
    <h2>The Wedding Of</h2>
    <h1 class="big-names">Ahmed & Fatima</h1>
    <p>With the blessings of Allah and our beloved parents</p>
  </section>

  <section>
    <h2>Countdown to the Big Day</h2>
    <div id="countdown"></div>
  </section>

</div>

<!-- AUDIO -->
<audio id="bgMusic" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_4f83c60c28.mp3?filename=elegant-background-110624.mp3" type="audio/mpeg">
</audio>

<script>

/* ENTER TRANSITION FIX (NO EMPTY SCREEN BUG) */
function enterInvitation() {
  document.getElementById("opening").classList.add("fade-out");

  setTimeout(() => {
    document.getElementById("mainContent").classList.add("show");
    document.getElementById("bgMusic").play().catch(()=>{});
  }, 600);
}

/* 3D TILT EFFECT DESKTOP ONLY */
if (window.innerWidth > 768) {
  const tilt = document.querySelector('.tilt');

  tilt.addEventListener('mousemove', (e) => {
    const rect = tilt.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    const centerX = rect.width / 2;
    const centerY = rect.height / 2;

    const rotateX = -(y - centerY) / 20;
    const rotateY = (x - centerX) / 20;

    tilt.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
  });

  tilt.addEventListener('mouseleave', () => {
    tilt.style.transform = "rotateX(0) rotateY(0)";
  });
}

/* COUNTDOWN */
const weddingDate = new Date("April 12, 2026 18:00:00").getTime();

setInterval(() => {
  const now = new Date().getTime();
  const distance = weddingDate - now;

  const days = Math.floor(distance / (1000 * 60 * 60 * 24));
  const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));

  document.getElementById("countdown").innerHTML =
    days + " Days " + hours + " Hours " + minutes + " Minutes ";

}, 1000);

</script>

</body>
</html>
