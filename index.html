<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">

<style>

/* =============================
   GLOBAL RESET
============================= */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  height:100%;
  overflow:hidden;
  background:#0c0c0c;
  font-family:'Cinzel', serif;
  color:white;
}

/* =============================
   LOADER
============================= */
.loader{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
  transition:opacity 1s ease;
}

.loader-text{
  font-family:'Playfair Display', serif;
  font-size:22px;
  letter-spacing:3px;
  color:#d4af37;
  margin-bottom:30px;
}

.loader-bar{
  width:200px;
  height:2px;
  background:rgba(255,215,0,0.2);
  overflow:hidden;
  position:relative;
}

.loader-bar::after{
  content:"";
  position:absolute;
  left:-100%;
  width:100%;
  height:100%;
  background:linear-gradient(90deg, transparent, gold, transparent);
  animation:loading 2s infinite;
}

@keyframes loading{
  0%{left:-100%;}
  100%{left:100%;}
}

/* =============================
   FIRST PAGE
============================= */
.page{
  position:relative;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:
    radial-gradient(circle at 30% 20%, rgba(255,215,0,0.05), transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(255,215,0,0.05), transparent 40%),
    #0c0c0c;
}

/* =============================
   3D PERSPECTIVE WRAPPER
============================= */
.perspective-wrapper{
  perspective:1400px;
  width:90%;
  max-width:650px;
}

/* =============================
   INVITATION CARD
============================= */
.invite-box{
  background:rgba(20,20,20,0.95);
  padding:70px 50px;
  border-radius:24px;
  text-align:center;
  transform-style:preserve-3d;
  transition:transform .25s ease;
  position:relative;

  border:1px solid rgba(212,175,55,0.3);

  box-shadow:
    0 40px 80px rgba(0,0,0,0.6),
    0 0 60px rgba(212,175,55,0.1),
    inset 0 0 40px rgba(255,215,0,0.03);
}

/* Soft outer glow */
.invite-box::before{
  content:"";
  position:absolute;
  inset:-2px;
  border-radius:24px;
  background:linear-gradient(45deg,#d4af37,#8f6b1c,#d4af37);
  opacity:0.15;
  z-index:-1;
}

/* Title */
.invite-title{
  font-size:2.6rem;
  letter-spacing:4px;
  color:#f5e6b3;
  margin-bottom:30px;
}

/* Subtitle */
.invite-subtitle{
  font-family:'Playfair Display', serif;
  font-size:18px;
  line-height:1.8;
  color:#cfcfcf;
  margin-bottom:50px;
}

/* Button */
.enter-btn{
  padding:14px 45px;
  font-size:15px;
  letter-spacing:2px;
  background:linear-gradient(45deg,#d4af37,#f1c94a);
  border:none;
  border-radius:40px;
  cursor:pointer;
  transition:.3s;
}

.enter-btn:hover{
  transform:translateY(-4px);
  box-shadow:0 15px 30px rgba(212,175,55,0.3);
}

/* Smooth Fade In */
.fade-in{
  opacity:0;
  transform:translateY(30px);
  animation:fadeUp 1.8s ease forwards;
  animation-delay:2s;
}

@keyframes fadeUp{
  to{
    opacity:1;
    transform:translateY(0);
  }
}

</style>
</head>
<body>

<!-- LOADER -->
<div class="loader" id="loader">
  <div class="loader-text">Preparing Invitation</div>
  <div class="loader-bar"></div>
</div>

<!-- FIRST PAGE -->
<div class="page">
  <div class="perspective-wrapper">
    <div class="invite-box fade-in" id="card">

      <div class="invite-title">YOU ARE INVITED</div>

      <div class="invite-subtitle">
        With gratitude and joy, we request the honour of your presence
        at a sacred celebration of love and unity.
      </div>

      <button class="enter-btn">
        Enter
      </button>

    </div>
  </div>
</div>

<script>

/* Loader Fade Out */
window.addEventListener("load",()=>{
  setTimeout(()=>{
    document.getElementById("loader").style.opacity="0";
    setTimeout(()=>{
      document.getElementById("loader").style.display="none";
    },1000);
  },2000);
});

/* 3D Tilt Effect */
const card = document.getElementById("card");
const wrapper = document.querySelector(".perspective-wrapper");

wrapper.addEventListener("mousemove",(e)=>{
  const rect = wrapper.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  const rotateX = ((y - rect.height/2) / rect.height) * 15;
  const rotateY = ((x - rect.width/2) / rect.width) * 15;

  card.style.transform = `rotateX(${-rotateX}deg) rotateY(${rotateY}deg)`;
});

wrapper.addEventListener("mouseleave",()=>{
  card.style.transform = "rotateX(0) rotateY(0)";
});

</script>

</body>
</html>
