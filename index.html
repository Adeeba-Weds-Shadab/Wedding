<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  height:100%;
  font-family:'Cinzel',serif;
  background:#050505;
  overflow-x:hidden;
}

/* ---------- GLOBAL WRAPPER ---------- */
.page{
  position:relative;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:40px 20px;
  transition:opacity 0.8s ease, transform 0.8s ease;
}

.hidden{
  opacity:0;
  pointer-events:none;
  transform:scale(1.05);
}

/* ---------- GOLD BACKGROUND SHIMMER ---------- */
.gold-bg{
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 20% 30%, rgba(255,215,0,0.08), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(255,215,0,0.08), transparent 40%),
    linear-gradient(120deg, rgba(255,215,0,0.05), transparent 40%, rgba(255,215,0,0.05));
  animation: shimmer 12s linear infinite;
  z-index:-2;
}

@keyframes shimmer{
  0%{background-position:0% 50%;}
  100%{background-position:200% 50%;}
}

/* ---------- GEOMETRIC OVERLAY ---------- */
.pattern{
  position:absolute;
  inset:0;
  background-image:url("https://www.transparenttextures.com/patterns/arabesque.png");
  opacity:0.05;
  z-index:-1;
}

/* ---------- INVITATION BOX ---------- */
.invite-box{
  position:relative;
  background:rgba(10,10,10,0.95);
  backdrop-filter:blur(15px);
  padding:60px 40px;
  max-width:600px;
  width:100%;
  text-align:center;
  border-radius:18px;
  transition:transform 0.2s ease;
  overflow:hidden;
}

/* EDGE GLOW FRAME */
.invite-box::before{
  content:"";
  position:absolute;
  inset:-2px;
  border-radius:20px;
  padding:2px;
  background:linear-gradient(
    90deg,
    #ff0080,
    #ff8c00,
    #ffd700,
    #00ffff,
    #ff0080
  );
  background-size:300% 300%;
  animation:borderShift 6s linear infinite;
  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;
  mask-composite:exclude;
}

@keyframes borderShift{
  0%{background-position:0% 50%;}
  100%{background-position:300% 50%;}
}

/* TEXT */
.invite-box h1{
  font-size:2.5rem;
  color:#ffd700;
  margin-bottom:20px;
  letter-spacing:2px;
}

.invite-box p{
  color:#ccc;
  font-size:1rem;
  margin-bottom:30px;
}

/* BUTTON */
.enter-btn{
  padding:14px 40px;
  background:linear-gradient(45deg,#d4af37,#ffd700);
  border:none;
  border-radius:30px;
  cursor:pointer;
  font-size:1rem;
  transition:all 0.3s ease;
}

.enter-btn:hover{
  transform:scale(1.08);
  box-shadow:0 0 20px gold;
}

/* MOBILE FIX */
@media(max-width:768px){
  .invite-box{
    padding:40px 25px;
    border-radius:16px;
  }
}

/* NEXT PAGE CONTENT */
.next-content{
  text-align:center;
  max-width:700px;
}

.next-content h2{
  font-size:2rem;
  color:#ffd700;
  margin-bottom:20px;
}

.next-content p{
  color:#ddd;
}
</style>
</head>

<body>

<!-- PAGE 1 -->
<div class="page" id="page1">
  <div class="gold-bg"></div>
  <div class="pattern"></div>

  <div class="invite-box" id="tiltBox">
    <h1>You Are Invited</h1>
    <p>To witness a moment of elegance and grace.</p>
    <button class="enter-btn" onclick="enterInvitation()">Enter Invitation</button>
  </div>
</div>

<!-- PAGE 2 -->
<div class="page hidden" id="page2">
  <div class="gold-bg"></div>
  <div class="pattern"></div>

  <div class="next-content">
    <h2>The Celebration Awaits</h2>
    <p>This is where full invitation content will go with same royal animated environment.</p>
  </div>
</div>

<script>

/* -------- PAGE TRANSITION -------- */
function enterInvitation(){
  document.getElementById("page1").classList.add("hidden");
  document.getElementById("page2").classList.remove("hidden");
}

/* -------- 3D TILT (MOBILE SAFE) -------- */
const box = document.getElementById("tiltBox");

box.addEventListener("mousemove",(e)=>{
  const rect = box.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const centerX = rect.width/2;
  const centerY = rect.height/2;
  const rotateX = -(y - centerY)/20;
  const rotateY = (x - centerX)/20;
  box.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
});

box.addEventListener("mouseleave",()=>{
  box.style.transform = "rotateX(0) rotateY(0)";
});

/* TOUCH SUPPORT */
box.addEventListener("touchmove",(e)=>{
  const touch = e.touches[0];
  const rect = box.getBoundingClientRect();
  const x = touch.clientX - rect.left;
  const y = touch.clientY - rect.top;
  const centerX = rect.width/2;
  const centerY = rect.height/2;
  const rotateX = -(y - centerY)/25;
  const rotateY = (x - centerX)/25;
  box.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
});

box.addEventListener("touchend",()=>{
  box.style.transform = "rotateX(0) rotateY(0)";
});

</script>

</body>
</html>
