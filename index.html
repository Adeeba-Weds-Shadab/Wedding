<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Wedding Invitation</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="cover" id="cover">
    <div class="card">
        <h1>Bismillah</h1>
        <p>You are invited to the wedding</p>
        <button onclick="openCard()">Tap to Open</button>
    </div>
</div>

<div class="content" id="content">

    <section class="section hero">
        <h2>Welcome</h2>
        <p>With the blessings of Allah, we invite you to celebrate this joyous occasion.</p>
    </section>

    <section class="section details">
        <h2>Wedding Details</h2>
        <p><strong>Date:</strong> 20th April 2026</p>
        <p><strong>Venue:</strong> Royal Banquet Hall</p>
    </section>

    <section class="section dua">
        <h2>Dua Request</h2>
        <p>Your presence and prayers mean everything to us.</p>
    </section>

</div>

<script src="script.js"></script>

</body>
</html>
