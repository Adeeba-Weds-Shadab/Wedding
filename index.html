<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* ================= RESET ================= */

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Montserrat', sans-serif;
  background: radial-gradient(circle at top left, #1a1a1a, #000);
  color: white;
  overflow-x: hidden;
}

/* ================= LUXURY BACKGROUND ================= */

.luxury-bg {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: -1;
  overflow: hidden;
}

.light-orb {
  position: absolute;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  filter: blur(150px);
  opacity: 0.3;
  animation: float 18s infinite alternate ease-in-out;
}

.orb1 { background: #d4af37; top: -100px; left: -100px; }
.orb2 { background: #7b5cff; bottom: -150px; right: -100px; animation-delay: 5s; }
.orb3 { background: #ffffff; top: 40%; left: 60%; animation-delay: 10s; }

@keyframes float {
  0% { transform: translate(0,0); }
  100% { transform: translate(60px,40px); }
}

/* ================= OPENING SCREEN ================= */

.opening-screen {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.opening-card {
  backdrop-filter: blur(25px);
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  padding: 60px 40px;
  border-radius: 30px;
  text-align: center;
  box-shadow: 0 0 60px rgba(212,175,55,0.15);
}

.opening-card h3 {
  font-family: 'Playfair Display', serif;
  font-weight: 400;
  letter-spacing: 3px;
  margin-bottom: 20px;
  opacity: 0.8;
}

.opening-card h1 {
  font-family: 'Playfair Display', serif;
  font-size: 42px;
  margin-bottom: 40px;
}

/* ================= BUTTON ================= */

.enter-btn {
  padding: 18px 50px;
  font-size: 16px;
  letter-spacing: 2px;
  background: linear-gradient(135deg, #d4af37, #f9e27d);
  border: none;
  border-radius: 50px;
  cursor: pointer;
  color: black;
  font-weight: 600;
  transition: 0.4s ease;
}

.enter-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 40px rgba(212,175,55,0.7);
}

/* ================= MAIN CONTENT ================= */

.main-content {
  display: none;
  padding: 80px 20px;
}

section {
  max-width: 900px;
  margin: 120px auto;
  text-align: center;
}

h2 {
  font-family: 'Playfair Display', serif;
  font-size: 36px;
  margin-bottom: 20px;
}

h1.big-names {
  font-family: 'Playfair Display', serif;
  font-size: 52px;
  margin-bottom: 10px;
}

p {
  font-size: 16px;
  opacity: 0.8;
  line-height: 1.7;
}

/* ================= EVENT CARDS ================= */

.event-section {
  display: flex;
  flex-wrap: wrap;
  gap: 30px;
  justify-content: center;
}

.event-card {
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.05);
  border-radius: 25px;
  padding: 40px;
  width: 300px;
  box-shadow: 0 0 30px rgba(212,175,55,0.15);
  transition: 0.4s ease;
}

.event-card:hover {
  transform: translateY(-10px);
}

/* ================= COUNTDOWN ================= */

#countdown {
  font-size: 28px;
  margin-top: 20px;
  font-weight: 600;
  letter-spacing: 2px;
}

/* ================= SCROLL REVEAL ================= */

.reveal {
  opacity: 0;
  transform: translateY(60px);
  transition: 1s ease;
}

.reveal.active {
  opacity: 1;
  transform: translateY(0);
}

/* ================= MOBILE ================= */

@media (max-width: 768px) {

  .opening-card {
    padding: 40px 20px;
  }

  .opening-card h1 {
    font-size: 30px;
  }

  h1.big-names {
    font-size: 36px;
  }

  section {
    margin: 80px auto;
  }

}

</style>
</head>
<body>

<!-- BACKGROUND -->
<div class="luxury-bg">
  <div class="light-orb orb1"></div>
  <div class="light-orb orb2"></div>
  <div class="light-orb orb3"></div>
</div>

<!-- OPENING SCREEN -->
<div class="opening-screen">
  <div class="opening-card">
    <h3>Bismillah-ir-Rahman-ir-Raheem</h3>
    <h1>You Are Invited</h1>
    <button class="enter-btn" onclick="enterInvitation()">Enter Invitation</button>
  </div>
</div>

<!-- MAIN CONTENT -->
<div class="main-content">

  <section class="reveal">
    <h2>The Wedding Of</h2>
    <h1 class="big-names">Ahmed & Fatima</h1>
    <p>With the blessings of Allah and our beloved parents</p>
  </section>

  <section class="event-section reveal">
    <div class="event-card">
      <h2>Nikkah Ceremony</h2>
      <p>Friday, 12 April 2026</p>
      <p>After Maghrib</p>
    </div>

    <div class="event-card">
      <h2>Walima Reception</h2>
      <p>Sunday, 14 April 2026</p>
      <p>7:00 PM Onwards</p>
    </div>
  </section>

  <section class="reveal">
    <h2>Countdown to the Big Day</h2>
    <div id="countdown"></div>
  </section>

</div>

<script>

/* ENTER BUTTON */
function enterInvitation() {
  document.querySelector('.opening-screen').style.display = "none";
  document.querySelector('.main-content').style.display = "block";
  window.scrollTo(0,0);
}

/* SCROLL REVEAL */
const revealElements = document.querySelectorAll('.reveal');

window.addEventListener('scroll', () => {
  const triggerBottom = window.innerHeight * 0.85;
  revealElements.forEach(el => {
    const boxTop = el.getBoundingClientRect().top;
    if(boxTop < triggerBottom){
      el.classList.add('active');
    }
  });
});

/* COUNTDOWN */
const weddingDate = new Date("April 12, 2026 18:00:00").getTime();

setInterval(() => {
  const now = new Date().getTime();
  const distance = weddingDate - now;

  const days = Math.floor(distance / (1000 * 60 * 60 * 24));
  const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));

  document.getElementById("countdown").innerHTML =
    days + " Days " + hours + " Hours " + minutes + " Minutes ";

}, 1000);

</script>

</body>
</html>
