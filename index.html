<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ahmed & Fatima - Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">






<style>

* {margin:0;padding:0;box-sizing:border-box;}

body {
  font-family:'Poppins',sans-serif;
  background:#000;
  color:white;
  overflow-x:hidden;
}

/* HERO */
.hero {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  background:radial-gradient(circle at center,#111 0%,#000 70%);
  position:relative;
}

/* FIXED OVERLAY */
.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(circle, rgba(212,175,55,0.06), transparent 70%);
  animation:glow 10s linear infinite;
  pointer-events:none; /* THIS FIXES CLICK ISSUE */
}

@keyframes glow {
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}

.bismillah {
  font-family:'Cinzel',serif;
  color:#d4af37;
  letter-spacing:3px;
  font-size:20px;
  margin-bottom:20px;
  opacity:0;
  animation:fadeIn 2s forwards;
}

.names {
  font-family:'Cinzel',serif;
  font-size:42px;
  font-weight:700;
  letter-spacing:3px;
  margin-bottom:15px;
  opacity:0;
  animation:fadeIn 2s forwards 1s;
}

.subtitle {
  color:#aaa;
  font-size:14px;
  margin-bottom:40px;
  opacity:0;
  animation:fadeIn 2s forwards 2s;
}

.open-btn {
  padding:14px 40px;
  border-radius:50px;
  border:1px solid #d4af37;
  background:transparent;
  color:#d4af37;
  font-size:14px;
  cursor:pointer;
  transition:0.4s ease;
  opacity:0;
  animation:fadeIn 2s forwards 3s;
  position:relative;
  z-index:2;
}

.open-btn:hover{
  background:#d4af37;
  color:black;
  box-shadow:0 0 25px rgba(212,175,55,0.8);
  transform:translateY(-3px);
}

@keyframes fadeIn{
  to{opacity:1;}
}

/* SECTION */
.section{
  padding:80px 20px;
  text-align:center;
  background:#111;
}

.section h2{
  font-family:'Cinzel',serif;
  color:#d4af37;
  margin-bottom:20px;
  font-size:28px;
}

.section p{
  color:#ccc;
  font-size:15px;
  line-height:1.8;
  max-width:400px;
  margin:0 auto 10px auto;
}

.countdown{
  margin-top:20px;
  font-size:16px;
  color:#d4af37;
}

.button-group{
  margin-top:30px;
}

.button-group button{
  padding:12px 26px;
  border-radius:40px;
  border:1px solid #d4af37;
  background:transparent;
  color:#d4af37;
  margin:8px;
  cursor:pointer;
  transition:0.4s;
}

.button-group button:hover{
  background:#d4af37;
  color:black;
}

html {
  scroll-behavior:smooth;
}

</style>



  

  
</head>

<body>

<div class="hero">
  <div class="bismillah">BISMILLAH</div>
  <div class="names">Ahmed & Fatima</div>
  <div class="subtitle">Together with our families</div>
  <button class="open-btn" onclick="scrollToSection()">Enter Invitation</button>
</div>

<div class="section" id="main">
  <h2>Nikah Ceremony</h2>
  <p>Date: 15 May 2026</p>
  <p>Venue: Royal Banquet Hall</p>

  <div class="countdown" id="countdown"></div>

  <div class="button-group">
    <button onclick="openMap()">View Location</button>
    <button onclick="rsvp()">RSVP on WhatsApp</button>
  </div>
</div>

<script>
function scrollToSection(){
  document.getElementById("main").scrollIntoView();
}

const eventDate = new Date("May 15, 2026 18:00:00").getTime();
setInterval(function(){
  const now = new Date().getTime();
  const distance = eventDate - now;
  const days = Math.floor(distance/(1000*60*60*24));
  const hours = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
  const minutes = Math.floor((distance%(1000*60*60))/(1000*60));
  document.getElementById("countdown").innerHTML =
  days+" Days | "+hours+" Hours | "+minutes+" Minutes";
},1000);

function openMap(){
  window.open("https://maps.google.com","_blank");
}

function rsvp(){
  window.open("https://wa.me/919999999999","_blank");
}
</script>

</body>
</html>
